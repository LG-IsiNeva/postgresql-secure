#####################################################################
## MAPPING DES CERTIFICATS CLIENTS VERS UTILISATEURS POSTGRESQL
#####################################################################
#
# Ce fichier permet de mapper plusieurs certificats (CN) vers le même
# utilisateur PostgreSQL. Utile pour avoir un certificat par poste
# client tout en utilisant le même compte PostgreSQL.
#
# FORMAT: map_name  system_username  database_username
#
# - map_name        : Nom du mapping (référencé dans pg_hba.conf)
# - system_username : Le CN du certificat client (ou regex avec /)
# - database_username : L'utilisateur PostgreSQL cible
#
#####################################################################

#####################################################################
## MAPPING DIRECT (1 CN = 1 USER avec même nom)
#####################################################################
# Les utilisateurs dont le CN correspond exactement au nom PostgreSQL
cert_map    admin           admin
cert_map    app_user        app_user
cert_map    backup_user     backup_user
cert_map    app_developer   app_developer

#####################################################################
## MAPPING MULTI-POSTES VERS APP_USER
#####################################################################
# Permet d'avoir plusieurs postes avec des certificats distincts
# mais qui utilisent tous le compte app_user
#
# Convention de nommage: app_<nom_du_poste>
# Exemple: app_pc_bureau, app_laptop_jean, app_desktop_compta
#
# Ajoutez une ligne par poste client:
# cert_map    app_pc_bureau       app_user
# cert_map    app_laptop_jean     app_user
# cert_map    app_desktop_compta  app_user

#####################################################################
## MAPPING MULTI-POSTES VERS BACKUP_USER
#####################################################################
# Même principe pour les postes de sauvegarde
#
# Convention de nommage: backup_<nom_du_poste>
# Exemple: backup_server1, backup_nas
#
# cert_map    backup_server1      backup_user
# cert_map    backup_nas          backup_user

#####################################################################
## MAPPING PAR REGEX (AVANCÉ)
#####################################################################
# Utiliser une regex pour mapper automatiquement plusieurs CN
# Le format regex est: /^pattern$/
#
# Exemple: Tous les CN commençant par "app_" mappés vers app_user
# cert_map    /^app_.*$/          app_user
#
# Exemple: Tous les CN commençant par "backup_" mappés vers backup_user
# cert_map    /^backup_.*$/       backup_user
cert_map    poste_laurent       app_developer
