# TYPE  DATABASE        USER            ADDRESS                 METHOD
#####################################################################
## CONFIGURATION mTLS (Mutual TLS) - AUTHENTIFICATION PAR CERTIFICAT
## Toutes les connexions TCP/IP requièrent un certificat client valide
#####################################################################

# 1. Connexion locale par socket Unix (pas de SSL nécessaire)
# Authentification par mot de passe sécurisé
local   all             all                                     scram-sha-256

#####################################################################
## CONNEXIONS TCP/IP - mTLS OBLIGATOIRE (clientcert=verify-full)   ##
#####################################################################

# 2. Connexions localhost via TCP/IP avec mTLS
# 'cert' = authentification par certificat uniquement
# 'clientcert=verify-full' = vérifie le certificat ET le CN du certificat
hostssl all             all             127.0.0.1/32            cert clientcert=verify-full
hostssl all             all             ::1/128                 cert clientcert=verify-full

# 3. Connexions DISTANTES avec mTLS OBLIGATOIRE
# Le client DOIT présenter un certificat valide signé par la CA
# Le Common Name (CN) du certificat doit correspondre au nom d'utilisateur PostgreSQL
hostssl all             all             0.0.0.0/0               cert clientcert=verify-full
hostssl all             all             ::/0                    cert clientcert=verify-full

#####################################################################
## RÈGLES DE RÉPLICATION - mTLS OBLIGATOIRE                         ##
#####################################################################

local   replication     all                                     scram-sha-256
hostssl replication     all             127.0.0.1/32            cert clientcert=verify-full
hostssl replication     all             ::1/128                 cert clientcert=verify-full
hostssl replication     all             0.0.0.0/0               cert clientcert=verify-full
hostssl replication     all             ::/0                    cert clientcert=verify-full

#####################################################################
## SÉCURITÉ RENFORCÉE                                               ##
#####################################################################
# AUCUNE connexion 'host' (non-SSL) n'est autorisée
# AUCUNE connexion 'trust' n'est autorisée
# Toutes les connexions réseau doivent utiliser mTLS